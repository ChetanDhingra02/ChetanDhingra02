
<style>
  #cosmos { background: #05040f; border-radius: 12px; overflow: hidden; position: relative; width: 100%; height: 520px; cursor: crosshair; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .legend { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 18px; z-index: 10; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.05em; opacity: 0.7; }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; }
  .tooltip { position: absolute; pointer-events: none; background: rgba(10,8,30,0.92); border: 1px solid rgba(140,100,255,0.4); border-radius: 8px; padding: 6px 12px; font-family: 'Courier New', monospace; font-size: 12px; color: #c9b8ff; white-space: nowrap; z-index: 20; display: none; backdrop-filter: blur(4px); }
  .group-label { position: absolute; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 5; }
</style>

<h2 class="sr-only">Interactive skill constellation map showing Chetan's technical skills organized into five star constellations by category</h2>

<div id="cosmos">
  <canvas id="bg"></canvas>
  <canvas id="main"></canvas>
  <div class="tooltip" id="tip"></div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div><span style="color:#a78bfa">Languages</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:#38bdf8"></div><span style="color:#38bdf8">ML & Stats</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:#34d399"></div><span style="color:#34d399">Visualization</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:#fb923c"></div><span style="color:#fb923c">Data Eng.</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:#f472b6"></div><span style="color:#f472b6">Analytics</span></div>
  </div>
</div>

<script>
const cosmos = document.getElementById('cosmos');
const bg = document.getElementById('bg');
const main = document.getElementById('main');
const tip = document.getElementById('tip');

const W = cosmos.offsetWidth;
const H = cosmos.offsetHeight;
bg.width = main.width = W;
bg.height = main.height = H;
const bx = bg.getContext('2d');
const mx = main.getContext('2d');

const constellations = [
  {
    name: "LANGUAGES", color: "#a78bfa", glow: "rgba(167,139,250,",
    nodes: [
      { x: 0.18, y: 0.22, label: "Python", r: 7 },
      { x: 0.10, y: 0.40, label: "R", r: 5.5 },
      { x: 0.24, y: 0.38, label: "SQL", r: 6 },
      { x: 0.14, y: 0.55, label: "Statistics", r: 5 },
    ],
    edges: [[0,1],[0,2],[1,3],[2,3]]
  },
  {
    name: "ML & STATS", color: "#38bdf8", glow: "rgba(56,189,248,",
    nodes: [
      { x: 0.44, y: 0.15, label: "scikit-learn", r: 6.5 },
      { x: 0.36, y: 0.30, label: "Machine Learning", r: 7 },
      { x: 0.52, y: 0.28, label: "Feature Eng.", r: 5.5 },
      { x: 0.40, y: 0.46, label: "Model Interpret.", r: 6 },
      { x: 0.56, y: 0.44, label: "Calibration", r: 4.5 },
    ],
    edges: [[0,1],[0,2],[1,2],[1,3],[2,4],[3,4]]
  },
  {
    name: "VISUALIZATION", color: "#34d399", glow: "rgba(52,211,153,",
    nodes: [
      { x: 0.76, y: 0.18, label: "Power BI", r: 6 },
      { x: 0.88, y: 0.30, label: "Tableau", r: 6 },
      { x: 0.80, y: 0.42, label: "Data Storytelling", r: 5.5 },
      { x: 0.70, y: 0.35, label: "Dashboard Design", r: 5 },
    ],
    edges: [[0,1],[0,3],[1,2],[2,3]]
  },
  {
    name: "DATA ENG.", color: "#fb923c", glow: "rgba(251,146,60,",
    nodes: [
      { x: 0.30, y: 0.68, label: "Pandas", r: 6 },
      { x: 0.20, y: 0.78, label: "NumPy", r: 5 },
      { x: 0.38, y: 0.82, label: "Data Cleaning", r: 5 },
      { x: 0.14, y: 0.68, label: "EDA", r: 5 },
    ],
    edges: [[0,1],[0,2],[0,3],[1,3]]
  },
  {
    name: "ANALYTICS", color: "#f472b6", glow: "rgba(244,114,182,",
    nodes: [
      { x: 0.62, y: 0.62, label: "Streamlit", r: 6.5 },
      { x: 0.74, y: 0.72, label: "Interpretable AI", r: 6 },
      { x: 0.60, y: 0.80, label: "Decision Support", r: 5.5 },
      { x: 0.82, y: 0.60, label: "Analytics Eng.", r: 5 },
    ],
    edges: [[0,1],[0,2],[1,3],[2,3]]
  }
];

const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.005 + 0.002
  });
}

function drawBg(t) {
  bx.clearRect(0, 0, W, H);
  bx.fillStyle = '#05040f';
  bx.fillRect(0, 0, W, H);
  for (const s of stars) {
    const alpha = 0.2 + 0.5 * Math.abs(Math.sin(s.a + t * s.speed));
    bx.beginPath();
    bx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bx.fillStyle = `rgba(200,190,255,${alpha})`;
    bx.fill();
  }
}

const nodes = [];
constellations.forEach(c => {
  c.nodes.forEach(n => {
    nodes.push({
      ...n,
      cx: n.x * W,
      cy: n.y * H,
      color: c.color,
      glow: c.glow,
      constIdx: constellations.indexOf(c),
      phase: Math.random() * Math.PI * 2,
      revealed: false,
      revealT: 0
    });
  });
});

const allEdges = [];
constellations.forEach((c, ci) => {
  const offset = constellations.slice(0, ci).reduce((a, cc) => a + cc.nodes.length, 0);
  c.edges.forEach(([a, b]) => {
    allEdges.push({ a: offset + a, b: offset + b, color: c.color, glow: c.glow, drawn: 0 });
  });
});

let hovered = -1;
let revealStart = Date.now();

main.addEventListener('mousemove', e => {
  const rect = main.getBoundingClientRect();
  const mx_ = e.clientX - rect.left;
  const my_ = e.clientY - rect.top;
  let found = -1;
  nodes.forEach((n, i) => {
    const dx = n.cx - mx_, dy = n.cy - my_;
    if (Math.sqrt(dx*dx + dy*dy) < n.r + 8) found = i;
  });
  hovered = found;
  if (found >= 0) {
    tip.style.display = 'block';
    tip.style.left = (nodes[found].cx + 14) + 'px';
    tip.style.top = (nodes[found].cy - 10) + 'px';
    tip.textContent = nodes[found].label;
    tip.style.color = nodes[found].color;
    tip.style.borderColor = nodes[found].color + '66';
  } else {
    tip.style.display = 'none';
  }
});

function draw(t) {
  const elapsed = (Date.now() - revealStart) / 1000;
  mx.clearRect(0, 0, W, H);

  allEdges.forEach(edge => {
    const na = nodes[edge.a], nb = nodes[edge.b];
    const targetDraw = Math.min(1, elapsed * 0.5 - 0.3);
    if (targetDraw <= 0) return;
    edge.drawn = Math.min(1, edge.drawn + 0.012);
    const ex = na.cx + (nb.cx - na.cx) * edge.drawn;
    const ey = na.cy + (nb.cy - na.cy) * edge.drawn;
    mx.beginPath();
    mx.moveTo(na.cx, na.cy);
    mx.lineTo(ex, ey);
    mx.strokeStyle = edge.color + '55';
    mx.lineWidth = 0.8;
    mx.stroke();
  });

  nodes.forEach((n, i) => {
    const pulse = 0.7 + 0.3 * Math.sin(t * 0.8 + n.phase);
    const isHov = i === hovered;
    const revDelay = i * 0.15;
    const revFrac = Math.min(1, Math.max(0, (elapsed - revDelay) * 2));
    if (revFrac <= 0) return;

    const r = n.r * revFrac;
    const glowR = (isHov ? n.r * 3.5 : n.r * 2.5) * pulse;

    const grad = mx.createRadialGradient(n.cx, n.cy, 0, n.cx, n.cy, glowR);
    grad.addColorStop(0, n.glow + (isHov ? '0.5)' : '0.25)'));
    grad.addColorStop(1, n.glow + '0)');
    mx.beginPath();
    mx.arc(n.cx, n.cy, glowR, 0, Math.PI * 2);
    mx.fillStyle = grad;
    mx.fill();

    mx.beginPath();
    mx.arc(n.cx, n.cy, r * pulse, 0, Math.PI * 2);
    mx.fillStyle = isHov ? '#ffffff' : n.color;
    mx.fill();

    if (revFrac > 0.6 && (isHov || elapsed > 3)) {
      const alpha = Math.min(1, (revFrac - 0.6) / 0.4);
      mx.font = `${isHov ? 600 : 400} ${isHov ? 12 : 11}px 'Courier New', monospace`;
      mx.fillStyle = `rgba(${isHov ? '255,255,255' : hexToRgb(n.color)},${alpha * (isHov ? 1 : 0.8)})`;
      mx.textAlign = 'left';
      const lx = n.cx + r + 7;
      const ly = n.cy + 4;
      mx.fillText(n.label, lx, ly);
    }
  });

  const nebula1 = mx.createRadialGradient(W*0.35, H*0.35, 0, W*0.35, H*0.35, W*0.28);
  nebula1.addColorStop(0, 'rgba(80,40,160,0.06)');
  nebula1.addColorStop(1, 'rgba(0,0,0,0)');
  mx.beginPath();
  mx.arc(W*0.35, H*0.35, W*0.28, 0, Math.PI*2);
  mx.fillStyle = nebula1;
  mx.fill();

  const nebula2 = mx.createRadialGradient(W*0.72, H*0.62, 0, W*0.72, H*0.62, W*0.22);
  nebula2.addColorStop(0, 'rgba(30,80,120,0.07)');
  nebula2.addColorStop(1, 'rgba(0,0,0,0)');
  mx.beginPath();
  mx.arc(W*0.72, H*0.62, W*0.22, 0, Math.PI*2);
  mx.fillStyle = nebula2;
  mx.fill();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

let frame = 0;
function loop() {
  frame++;
  const t = frame * 0.016;
  if (frame % 2 === 0) drawBg(t);
  draw(t);
  requestAnimationFrame(loop);
}
drawBg(0);
loop();
</script>
