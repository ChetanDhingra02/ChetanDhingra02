name: Generate Skill Constellation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-constellation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install svgwrite

      - name: Ensure assets folder exists
        run: |
          mkdir -p assets

      - name: Generate SVG
        run: |
          python scripts/generate_constellation.py

          
      - name: Commit Updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/skill-constellation.svg

          git commit -m "✨ Update cosmic skill constellation" || echo "No changes to commit"

          git pull --rebase origin main

          git push origin main
