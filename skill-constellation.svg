<svg width="1100" height="560" viewBox="0 0 1100 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated skill constellation map for Chetan">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="38%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <radialGradient id="nebulaA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#312e81" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebulaB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.24"/>
      <stop offset="60%" stop-color="#164e63" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <filter id="glowCyan" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowViolet" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.45  0 0 0 0 0.25  0 0 0 0 1  0 0 0 0.7 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="lineCyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0.25"/>
    </linearGradient>

    <style>
      .title { font: 700 27px 'Courier New', monospace; fill: #e0f2fe; letter-spacing: 5px; }
      .subtitle { font: 400 13px 'Courier New', monospace; fill: #94a3b8; letter-spacing: 2px; }
      .label { font: 600 13px 'Courier New', monospace; fill: #dbeafe; letter-spacing: .4px; }
      .group { font: 700 11px 'Courier New', monospace; letter-spacing: 2px; opacity: .9; }
      .tiny { font: 400 10px 'Courier New', monospace; fill:#64748b; letter-spacing:1.4px; }
      .panel { fill: rgba(2,6,23,.42); stroke: rgba(148,163,184,.24); stroke-width: 1; }
      .edge { stroke: url(#lineCyan); stroke-width: 1.2; stroke-linecap: round; opacity: .55; stroke-dasharray: 8 8; animation: dash 7s linear infinite; }
      .edgeSoft { stroke-width: 5; stroke-linecap: round; opacity: .09; }
      .node { filter:url(#glowCyan); transform-box: fill-box; transform-origin: center; animation: pulse 3.5s ease-in-out infinite; }
      .node2 { filter:url(#glowViolet); transform-box: fill-box; transform-origin: center; animation: pulse2 4.2s ease-in-out infinite; }
      .star { animation: twinkle 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .float { animation: float 8s ease-in-out infinite; }
      .pixel { animation: blink 2.8s steps(2,end) infinite; }
      .scan { opacity: .16; animation: scanMove 6s ease-in-out infinite; }
      .comet { animation: comet 7s ease-in-out infinite; opacity:0; }
      @keyframes pulse { 0%,100%{ transform:scale(1); opacity:.82;} 50%{ transform:scale(1.25); opacity:1;} }
      @keyframes pulse2 { 0%,100%{ transform:scale(.95); opacity:.78;} 50%{ transform:scale(1.18); opacity:1;} }
      @keyframes twinkle { 0%,100%{ opacity:.18; transform:scale(.85);} 50%{ opacity:1; transform:scale(1.4);} }
      @keyframes dash { to { stroke-dashoffset: -80; } }
      @keyframes float { 0%,100%{ transform:translateY(0px);} 50%{ transform:translateY(-9px);} }
      @keyframes blink { 0%,55%,100%{ opacity:.16;} 65%,80%{ opacity:.85;} }
      @keyframes scanMove { 0%,100%{ transform:translateY(-160px);} 50%{ transform:translateY(160px);} }
      @keyframes comet { 0%{opacity:0; transform:translate(-180px,-80px);} 15%{opacity:.85;} 45%{opacity:.85;} 60%,100%{opacity:0; transform:translate(420px,190px);} }
    </style>
  </defs>

  <rect width="1100" height="560" rx="22" fill="url(#bg)"/>
  <rect x="18" y="18" width="1064" height="524" rx="18" class="panel"/>

  <circle cx="265" cy="210" r="215" fill="url(#nebulaA)" class="float"/>
  <circle cx="790" cy="345" r="205" fill="url(#nebulaB)" class="float" style="animation-delay:-3s"/>
  <path d="M45 92 H1055" stroke="#8b5cf6" stroke-opacity=".22"/>
  <path d="M45 500 H1055" stroke="#22d3ee" stroke-opacity=".18"/>

  <g class="scan">
    <rect x="30" y="260" width="1040" height="2" fill="#22d3ee"/>
    <rect x="30" y="266" width="1040" height="1" fill="#a78bfa"/>
  </g>

  <g class="comet">
    <path d="M155 96 L298 144" stroke="#f8fafc" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="298" cy="144" r="3" fill="#fbbf24" filter="url(#glowCyan)"/>
  </g>

  <text x="550" y="57" text-anchor="middle" class="title">SKILL CONSTELLATION</text>
  <text x="550" y="80" text-anchor="middle" class="subtitle">LANGUAGES · ML &amp; STATS · VISUALIZATION · DATA ENGINEERING · ANALYTICS</text>

  <!-- background stars -->
  <g>
    <circle class="star" cx="76" cy="132" r="1.4" fill="#e0f2fe"/>
    <circle class="star" cx="144" cy="471" r="1.1" fill="#c4b5fd" style="animation-delay:-.4s"/>
    <circle class="star" cx="219" cy="105" r="1.7" fill="#fef3c7" style="animation-delay:-1.2s"/>
    <circle class="star" cx="337" cy="491" r="1.2" fill="#bae6fd" style="animation-delay:-2.1s"/>
    <circle class="star" cx="432" cy="126" r="1.3" fill="#ddd6fe" style="animation-delay:-1.7s"/>
    <circle class="star" cx="514" cy="455" r="1.6" fill="#e0f2fe" style="animation-delay:-.7s"/>
    <circle class="star" cx="632" cy="113" r="1.2" fill="#fef3c7" style="animation-delay:-2.7s"/>
    <circle class="star" cx="724" cy="478" r="1.5" fill="#bae6fd" style="animation-delay:-1.4s"/>
    <circle class="star" cx="842" cy="124" r="1.1" fill="#ddd6fe" style="animation-delay:-.9s"/>
    <circle class="star" cx="1012" cy="429" r="1.7" fill="#e0f2fe" style="animation-delay:-2.3s"/>
    <rect class="pixel" x="960" y="171" width="4" height="4" fill="#22d3ee"/>
    <rect class="pixel" x="110" y="350" width="3" height="3" fill="#a78bfa" style="animation-delay:-1s"/>
    <rect class="pixel" x="1006" y="310" width="3" height="3" fill="#fbbf24" style="animation-delay:-1.8s"/>
    <rect class="pixel" x="414" y="405" width="4" height="4" fill="#34d399" style="animation-delay:-.6s"/>
  </g>

  <!-- soft connection glows -->
  <g class="edgeSoft" stroke="#7dd3fc">
    <path d="M167 150 L94 245 L213 243 L146 355" />
    <path d="M470 128 L386 210 L545 212 L420 323 L596 326" />
    <path d="M806 142 L945 205 L875 318 L755 271" />
    <path d="M244 420 L134 458 L344 467 L196 372" />
    <path d="M675 398 L812 423 L682 486 L920 375" />
  </g>

  <!-- animated constellation lines -->
  <g>
    <path class="edge" d="M167 150 L94 245 L213 243 L146 355" />
    <path class="edge" d="M94 245 L213 243" style="animation-delay:-1s"/>
    <path class="edge" d="M470 128 L386 210 L545 212 L420 323 L596 326" style="animation-delay:-.5s"/>
    <path class="edge" d="M386 210 L420 323" style="animation-delay:-2s"/>
    <path class="edge" d="M806 142 L945 205 L875 318 L755 271 L806 142" style="animation-delay:-1.4s"/>
    <path class="edge" d="M244 420 L134 458 L196 372 L344 467 L244 420" style="animation-delay:-2.5s"/>
    <path class="edge" d="M675 398 L812 423 L682 486 L920 375 L812 423" style="animation-delay:-3.1s"/>
  </g>

  <!-- Languages -->
  <g>
    <text x="90" y="124" class="group" fill="#a78bfa">LANGUAGES</text>
    <circle class="node2" cx="167" cy="150" r="7" fill="#a78bfa"/>
    <text class="label" x="182" y="154">Python</text>
    <circle class="node2" cx="94" cy="245" r="5.5" fill="#a78bfa" style="animation-delay:-.7s"/>
    <text class="label" x="109" y="249">R</text>
    <circle class="node2" cx="213" cy="243" r="6" fill="#a78bfa" style="animation-delay:-1.4s"/>
    <text class="label" x="229" y="247">SQL</text>
    <circle class="node2" cx="146" cy="355" r="5" fill="#a78bfa" style="animation-delay:-2.2s"/>
    <text class="label" x="161" y="359">Statistics</text>
  </g>

  <!-- ML Stats -->
  <g>
    <text x="398" y="104" class="group" fill="#38bdf8">ML &amp; STATS</text>
    <circle class="node" cx="470" cy="128" r="6.5" fill="#38bdf8"/>
    <text class="label" x="485" y="132">scikit-learn</text>
    <circle class="node" cx="386" cy="210" r="7" fill="#38bdf8" style="animation-delay:-.5s"/>
    <text class="label" x="401" y="214">Machine Learning</text>
    <circle class="node" cx="545" cy="212" r="5.5" fill="#38bdf8" style="animation-delay:-1.1s"/>
    <text class="label" x="561" y="216">Feature Eng.</text>
    <circle class="node" cx="420" cy="323" r="6" fill="#38bdf8" style="animation-delay:-1.8s"/>
    <text class="label" x="435" y="327">Model Interpret.</text>
    <circle class="node" cx="596" cy="326" r="4.7" fill="#38bdf8" style="animation-delay:-2.4s"/>
    <text class="label" x="611" y="330">Calibration</text>
  </g>

  <!-- Viz -->
  <g>
    <text x="770" y="116" class="group" fill="#34d399">VISUALIZATION</text>
    <circle class="node" cx="806" cy="142" r="6" fill="#34d399"/>
    <text class="label" x="821" y="146">Power BI</text>
    <circle class="node" cx="945" cy="205" r="6" fill="#34d399" style="animation-delay:-.8s"/>
    <text class="label" x="960" y="209">Tableau</text>
    <circle class="node" cx="875" cy="318" r="5.5" fill="#34d399" style="animation-delay:-1.7s"/>
    <text class="label" x="890" y="322">Data Storytelling</text>
    <circle class="node" cx="755" cy="271" r="5" fill="#34d399" style="animation-delay:-2.6s"/>
    <text class="label" x="770" y="275">Dashboard Design</text>
  </g>

  <!-- Data Eng -->
  <g>
    <text x="188" y="397" class="group" fill="#fb923c">DATA ENGINEERING</text>
    <circle class="node2" cx="244" cy="420" r="6" fill="#fb923c"/>
    <text class="label" x="259" y="424">Pandas</text>
    <circle class="node2" cx="134" cy="458" r="5" fill="#fb923c" style="animation-delay:-.9s"/>
    <text class="label" x="149" y="462">NumPy</text>
    <circle class="node2" cx="344" cy="467" r="5.5" fill="#fb923c" style="animation-delay:-1.8s"/>
    <text class="label" x="359" y="471">Data Cleaning</text>
    <circle class="node2" cx="196" cy="372" r="5" fill="#fb923c" style="animation-delay:-2.7s"/>
    <text class="label" x="211" y="376">EDA</text>
  </g>

  <!-- Analytics -->
  <g>
    <text x="686" y="368" class="group" fill="#f472b6">ANALYTICS</text>
    <circle class="node2" cx="675" cy="398" r="6.5" fill="#f472b6"/>
    <text class="label" x="690" y="402">Streamlit</text>
    <circle class="node2" cx="812" cy="423" r="6" fill="#f472b6" style="animation-delay:-.6s"/>
    <text class="label" x="827" y="427">Interpretable AI</text>
    <circle class="node2" cx="682" cy="486" r="5.5" fill="#f472b6" style="animation-delay:-1.4s"/>
    <text class="label" x="697" y="490">Decision Support</text>
    <circle class="node2" cx="920" cy="375" r="5" fill="#f472b6" style="animation-delay:-2.1s"/>
    <text class="label" x="935" y="379">Analytics Eng.</text>
  </g>

  <text x="550" y="525" text-anchor="middle" class="tiny">Animated SVG preview · GitHub-safe constellation · no JavaScript required</text>
</svg>
